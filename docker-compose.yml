services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3000
      - BASE_URL=http://localhost:3000
    restart: unless-stopped
    healthcheck:
        test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
        interval: 5s
        timeout: 3s
        retries: 10
        start_period: 10s
